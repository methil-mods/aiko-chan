# ──────────────────────────────────────────────
# dataset-aiko configuration
# ──────────────────────────────────────────────

paths:
  raw: "data/raw"
  augmented: "data/augmented"
  filtered: "data/filtered"

augmentation:
  # How many augmented variants to generate per source image
  num_variants: 10

  # Integer scale factors (nearest-neighbor, no blur)
  scale: [1, 2, 3]

  # Hue rotation range in degrees [-180, 180]
  hue_shift: [-30, 30]

  # Saturation multiplier range
  saturation: [0.7, 1.3]

  # Value / brightness multiplier range
  value: [0.8, 1.2]

  # Translation in pixels
  translate_x: [-8, 8]
  translate_y: [-8, 8]

  # Horizontal flip (safe for pixel art)
  flip_horizontal: true

  # Background fill for translation (RGBA)
  bg_color: [0, 0, 0, 0]

  # Color palette swap — map source hex colors to target hex colors
  # palette_swap:
  #   "#ff0000": "#00ff00"
  #   "#0000ff": "#ffff00"

filter:
  # Backbone model for feature extraction
  model: "resnet18"

  # Categories for expression / pose classification
  categories:
    - "happy"
    - "sad"
    - "neutral"
    - "walking"
    - "idle"
    - "attacking"

  # Path to JSON file with seed labels  { "image_filename": "category" }
  seed_labels_path: "data/seed_labels.json"

  # Classifier type: "svm" or "knn"
  classifier: "svm"
