# ──────────────────────────────────────────────
# lora-config-aiko: Flux LoRA for Weird Pixel Art
# ──────────────────────────────────────────────

model:
  name: "black-forest-labs/FLUX.2-klein-4B" # Updated correct model ID
  variant: "4b"

training:
  learning_rate: 0.0002
  num_steps: 1500
  batch_size: 1
  gradient_accumulation_steps: 4
  optimizer: "adamw"
  lr_scheduler: "constant"

quantization:
  enabled: true
  bits: 4
  double_quant: true
  compute_dtype: "bfloat16"
  
lora:
  rank: 16 # High rank to capture weird textures and fine pixel details
  alpha: 16
  target_modules: ["to_q", "to_k", "to_v", "to_out.0"] # Standard Flux attention layers

dataset:
  path: "dataset/data/augmented" # Using the output from the augmentation toolkit
  trigger_word: "weird pixel art style"
  image_size: 512 # Upscaled via nearest-neighbor during preprocessing
  upscale_factor: 8 # Factor to use if images are small (e.g. 64x64 -> 512x512)

output:
  dir: "output/weird_pixel_art"
  save_every: 500
  sample_every: 100
  sample_prompt: "a strange melting pixel creature, weird pixel art style, hyper-detailed colors"
